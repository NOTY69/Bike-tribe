<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Info</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #a8e6cf;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(168, 230, 207, 0.3);
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 1;
        }

        .form-container {
            transition: all 0.3s ease;
        }

        .form-container.hidden {
            display: none;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(44, 62, 80, 0.1);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        input:focus {
            border-color: #a8e6cf;
            outline: none;
            box-shadow: 0 0 0 3px rgba(168, 230, 207, 0.2);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .password-toggle:hover {
            opacity: 1;
        }

        .confirm-btn {
            width: 100%;
            padding: 14px;
            background: #a8e6cf;
            color: #2c3e50;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .confirm-btn:hover {
            background: #8ed1fc;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(142, 209, 252, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .switch-form {
            text-align: center;
            margin-top: 25px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .switch-form a {
            color: #a8e6cf;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .switch-form a:hover {
            color: #8ed1fc;
        }
    </style>
</head>
<body>
    <div class="container">

        <form action="{% url 'bike_info' distance=distance %}" method="POST">
        {% csrf_token %}
    <div class="bike-info-card">
        <h1>BIKE INFO</h1>
        
        <div class="input-group">
            <input type="text" id="bikeName" name="bikeName" placeholder="Bike Name" required>
        </div>
        
        <div class="input-group">
            <input type="text" id="cc" name="cc" placeholder="CC" required>
        </div>
        
        <div class="input-group">
            <input type="text" id="distance" name="distance" placeholder="km to travel" value="{{distance}}" required>
        </div>
        
        <button type="submit" class="confirm-btn">Confirm</button>
    </div>
</form>

    </div>
</body>
</html>
